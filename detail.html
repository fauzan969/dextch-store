<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pesanan - Dextc store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Coda<span>Topup</span></a>
            <div class="nav-links"><a href="index.html">← Kembali</a></div>
        </div>
    </nav>

    <section class="detail-section">
        <div class="container">
            <div class="detail-card">
                <h2 id="namaGame"></h2>

                <!-- Kolom ID & Server -->
                <div class="form-group">
                    <label>ID Akun</label>
                    <input type="text" id="idAkun" placeholder="Masukkan ID akun kamu">
                </div>
                <div class="form-group" id="serverGroup" style="display: none;">
                    <label>Server / Zona ID</label>
                    <input type="text" id="serverAkun" placeholder="Masukkan nomor server/zona">
                </div>

                <!-- Pilihan Nominal + Harga -->
                <h4>Pilih Nominal</h4>
                <div class="nominal-grid" id="daftarNominal"></div>

                <!-- Metode Pembayaran -->
                <h4>Metode Pembayaran</h4>
                <div class="metode-bayar">
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="DANA"> DANA</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="GoPay"> GoPay</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="OVO"> OVO</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="ShopeePay"> ShopeePay</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="BCA"> BCA Transfer</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="Indomaret"> Indomaret</label>
                    <label class="opsi-bayar"><input type="radio" name="bayar" value="Alfamart"> Alfamart</label>
                </div>

                <!-- Ringkasan Pesanan -->
                <div class="ringkasan">
                    <h4>Ringkasan Pesanan</h4>
                    <p>Produk: <span id="rProduk">-</span></p>
                    <p>ID / Server: <span id="rIdServer">-</span></p>
                    <p>Nominal: <span id="rNominal">-</span></p>
                    <p><strong>Total Bayar: <span id="rHarga">Rp 0</span></strong></p>
                </div>

                <button class="btn-bayar" onclick="lanjutPesan()">Lanjut Pembayaran</button>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><p>&copy; 2026 Dextc store</p></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
